  <style>
    .body-banco {
      font-family: 'Poppins', sans-serif;
      background-color: rgba(0, 0, 0, 0.505);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container-pago{
         height: 550px;
      width: 800px;
       background: white;
             border-radius: 5px;

    }

    .form-container {
      display: block;
      border-radius: 10px;
      height: 10px;
      width: 100%;
    }

    .form-container h2 {
        padding-bottom: 6.4%;
      text-align: center;
    }

    .form-container input {
      width: 100%;
      height: 20px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .form-container button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .form-container button:hover {
      background: #45a049;
    }
  </style>
  <div class="body-banco">
        <div class="container-pago">
            <div class="form-container">
        <h2>Datos de Pago</h2>
                <form>
                    <input type="text" placeholder="Nombre en la tarjeta" required>

                    <input type="text" placeholder="Número de tarjeta" rows="1" cols="16" maxlength="16" required>

                    <input type="text" placeholder="Fecha de expiración (MM/AA)" required>

                    <input type="text" placeholder="CVV" maxlength="4" required>

                    <button type="submit">Pagar</button>
                </form>
            </div>
        </div>
  </div>
